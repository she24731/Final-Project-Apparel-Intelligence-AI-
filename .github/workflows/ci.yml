name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (typecheck, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apparel-intelligence/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apparel-intelligence/frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  backend:
    name: Backend (smoke)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apparel-intelligence/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: apparel-intelligence/backend/requirements.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Smoke (imports + key endpoints)
        env:
          # CI should run deterministically without secrets.
          GEMINI_API_KEY: ""
          GEMINI_MODEL: "gemini-2.5-flash"
          BACKEND_HOST: "127.0.0.1"
          BACKEND_PORT: "8000"
          FRONTEND_API_BASE_URL: "http://127.0.0.1:8000"
          MEDIA_PROVIDER: "mock"
        run: |
          python -m py_compile app/main.py
          python scripts/ci_smoke.py

